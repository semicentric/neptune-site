name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache-bust assets with commit hash
        run: |
          HASH=$(git rev-parse --short HEAD)
          sed -i "s|href=\"styles.css\"|href=\"styles.css?v=${HASH}\"|" index.html
          sed -i "s|src=\"main.js\"|src=\"main.js?v=${HASH}\"|" index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
